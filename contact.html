  <main style="padding:60px; max-width:800px; margin:0 auto;">
    <h1>Contact Us</h1>
    <p>Fill out the form below or use the contact details to reach us.</p>

    <form action="#" method="post" style="margin-top:24px; display:grid; gap:12px;">
      <input type="text" name="name" placeholder="Your name" required style="padding:10px; border-radius:6px; border:1px solid #d1d5db;">
      <input type="email" name="email" placeholder="Your email" required style="padding:10px; border-radius:6px; border:1px solid #d1d5db;">
      <textarea name="message" rows="6" placeholder="Message" required style="padding:10px; border-radius:6px; border:1px solid #d1d5db;"></textarea>
      <button type="submit" style="background:#2563eb; color:white; padding:12px 18px; border-radius:8px; border:none;">Send Message</button>
    </form>

    <section style="margin-top:36px;">
